<form method="post" action="{{ action_url }}" class="survey-ajax-form survey-modal survey-modal--danger">
    {% csrf_token %}
    <div class="modal-header survey-modal-header">
        <div class="survey-modal-header-text">
            <h5 class="modal-title">Удаление анкеты</h5>
        </div>
        <button type="button" class="close" data-dismiss="modal" aria-label="Закрыть">
            <span aria-hidden="true">&times;</span>
        </button>
    </div>
    <div class="modal-body survey-modal-body">
        <p class="survey-modal-message">
            Вы уверены, что хотите удалить анкету <strong>«{{ survey.title }}»</strong>?
            Все вопросы и ответы студентов будут удалены безвозвратно.
        </p>
        <div class="survey-form-group survey-form-group--checkbox mb-0">
            <div class="survey-checkbox-row">
                {{ form.confirm }}
                <label class="survey-checkbox-label" for="id_confirm">Подтверждаю удаление</label>
            </div>
            {% if form.confirm.errors %}
                <div class="survey-field-error">{{ form.confirm.errors.0 }}</div>
            {% endif %}
        </div>
    </div>
    <div class="modal-footer survey-modal-footer">
        <button type="button" class="btn btn-sm survey-btn-cancel" data-dismiss="modal">Отмена</button>
        <button type="submit" class="btn btn-sm btn-survey">Удалить</button>
    </div>
</form>
