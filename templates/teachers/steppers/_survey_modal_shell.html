{% load i18n %}
<div class="modal fade" id="surveySubmissionsModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable" role="document">
        <div class="modal-content app-modal">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="fas fa-poll" aria-hidden="true"></i>
                    Анкетирование — <span id="survey-modal-fio"></span>
                </h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Закрыть' %}">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body" id="survey-modal-body">
                <div class="text-center text-muted py-4">
                    <i class="fas fa-spinner fa-spin fa-lg mb-2 d-block"></i>
                    Загрузка…
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-secondary" data-dismiss="modal">Закрыть</button>
            </div>
        </div>
    </div>
</div>
